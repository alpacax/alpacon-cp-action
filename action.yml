name: 'Alpacon CP Action'
description: 'Copies files to a target server using alpacon cp.'
author: sangyeong01

branding:
  icon: 'terminal'
  color: 'blue'

inputs:
  workspace-url:
    description: 'Alpacon workspace URL.'
    required: true
  api-token:
    description: 'Alpacon API token for authentication.'
    required: true
  source:
    description: 'Source path(s). For upload: local file/directory (supports multiple paths, one per line). For download: remote server path (single path only).'
    required: true
  target-server:
    description: 'Target server name.'
    required: true
  target-path:
    description: 'Target path. For upload: remote server path. For download: local destination path.'
    required: true
  mode:
    description: 'Direction of copy. "upload" (default) for local→server, "download" for server→local.'
    required: false
    default: 'upload'
  recursive:
    description: 'Set to true to copy directories recursively (-r option).'
    required: false
    default: 'false'
  username:
    description: 'Username to execute the command as (e.g., root, ubuntu).'
    required: false
  groupname:
    description: 'Group name to execute the command as.'
    required: false

runs:
  using: "composite"
  steps:
    - name: Login to Alpacon
      run: |
        set -e
        alpacon login "${{ inputs.workspace-url }}" -t "${{ inputs.api-token }}"
      shell: bash
    - name: Execute CP
      env:
        INPUT_USERNAME: ${{ inputs.username }}
        INPUT_GROUPNAME: ${{ inputs.groupname }}
        INPUT_RECURSIVE: ${{ inputs.recursive }}
        INPUT_SOURCE: ${{ inputs.source }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_TARGET_SERVER: ${{ inputs.target-server }}
        INPUT_TARGET_PATH: ${{ inputs.target-path }}
      run: |
        set -e
        # Validate groupname requires username
        if [[ -z "$INPUT_USERNAME" && -n "$INPUT_GROUPNAME" ]]; then
          echo "Error: groupname requires username to be specified"
          exit 1
        fi

        # Build command args with optional flags
        CP_ARGS=(alpacon cp)
        [[ "$INPUT_RECURSIVE" = "true" ]] && CP_ARGS+=(-r)
        [[ -n "$INPUT_USERNAME" ]] && CP_ARGS+=(-u "$INPUT_USERNAME")
        [[ -n "$INPUT_GROUPNAME" ]] && CP_ARGS+=(-g "$INPUT_GROUPNAME")

        # Parse multiline source paths
        SOURCES=()
        while IFS= read -r src || [[ -n "$src" ]]; do
          [[ -n "$src" ]] && SOURCES+=("$src")
        done <<< "$INPUT_SOURCE"

        if [ "${#SOURCES[@]}" -eq 0 ]; then
          echo "Error: no source paths provided"
          exit 1
        fi

        if [ "$INPUT_MODE" = "download" ]; then
          if [ "${#SOURCES[@]}" -gt 1 ]; then
            echo "Error: download mode supports only a single source path, but ${#SOURCES[@]} were provided"
            exit 1
          fi
          "${CP_ARGS[@]}" "$INPUT_TARGET_SERVER:${SOURCES[0]}" "$INPUT_TARGET_PATH"
        else
          "${CP_ARGS[@]}" "${SOURCES[@]}" "$INPUT_TARGET_SERVER:$INPUT_TARGET_PATH"
        fi
      shell: bash
